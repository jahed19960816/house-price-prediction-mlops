<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fa;
        }

        .container-box{
            max-width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#0d6efd;
        }

        .btn{
            width:100%;
            margin-top:15px;
        }

        h3{
            margin-top:25px;
            text-align:center;
            color:green;
        }
    </style>

</head>

<body>

<div class="container-box">

<h1>House Price Prediction</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="mb-3">
<label>Lot Frontage</label>
<input type="number" class="form-control" name="LotFrontage" required>
</div>

<div class="mb-3">
<label>Lot Area</label>
<input type="number" class="form-control" name="LotArea" required>
</div>

<div class="mb-3">
<label>Overall Quality (1-10)</label>
<input type="number" class="form-control" name="OverallQual" min="1" max="10" required>
</div>

<div class="mb-3">
<label>Year Built</label>
<input type="number" class="form-control" name="YearBuilt" required>
</div>

<div class="mb-3">
<label>Year Remodeled</label>
<input type="number" class="form-control" name="YearRemodAdd" required>
</div>

<div class="mb-3">
<label>Finished Basement Area</label>
<input type="number" class="form-control" name="BsmtFinSF1" required>
</div>

<div class="mb-3">
<label>Total Basement Area</label>
<input type="number" class="form-control" name="TotalBsmtSF" required>
</div>

<div class="mb-3">
<label>1st Floor Area</label>
<input type="number" class="form-control" name="FirstFlrSF" required>
</div>

<div class="mb-3">
<label>2nd Floor Area</label>
<input type="number" class="form-control" name="SecondFlrSF" required>
</div>

<div class="mb-3">
<label>Ground Living Area</label>
<input type="number" class="form-control" name="GrLivArea" required>
</div>

<div class="mb-3">
<label>Full Bathrooms</label>
<input type="number" class="form-control" name="FullBath" required>
</div>

<div class="mb-3">
<label>Total Rooms Above Ground</label>
<input type="number" class="form-control" name="TotRmsAbvGrd" required>
</div>

<div class="mb-3">
<label>Garage Capacity (Cars)</label>
<input type="number" class="form-control" name="GarageCars" required>
</div>

<div class="mb-3">
<label>Garage Area</label>
<input type="number" class="form-control" name="GarageArea" required>
</div>

<div class="mb-3">
<label>Garage Finish</label>

<select class="form-control" name="GarageFinish" required>

<option value="Fin">Finished</option>

<option value="RFn">Rough Finished</option>

<option value="Unf">Unfinished</option>

</select>

</div>

<input class="btn btn-primary btn-lg" type="submit" value="Predict House Price">

</form>

{% if results %}

<h3>

Predicted House Price : {{ results }}

</h3>

{% endif %}

</div>

</body>

</html>
